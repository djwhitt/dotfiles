hide_window_decorations yes
enable_audio_bell       no
allow_remote_control    yes
listen_on               unix:$XDG_RUNTIME_DIR/kitty.sock
font_family             Fira Code Regular Nerd Font Complete
bold_font               Fira Code Bold Nerd Font Complete
enabled_layouts         tall:bias=50;full_size=1;mirrored=false

# Tabs
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

# Shift-enter for Claude Code
map --when-focus-on title:".*claude.*" shift+enter send_key alt+enter
map --when-focus-on title:".*✳.*" shift+enter send_key alt+enter
map --when-focus-on title:".*Nvim.*" shift+enter send_key alt+enter
map --when-focus-on cmdline:claude shift+enter send_key alt+enter

# ------------------------------
# TAB BAR STYLING
# ------------------------------

tab_bar_margin_width 8.0
tab_bar_margin_height 4.0

# Font size for tabs
tab_bar_font_size 12.0

# Rounded corners (requires kitty 0.34+)
tab_bar_style powerline

# Powerline separator color blending
tab_separator ""

# Active tab colors
active_tab_background   #5c5cff
active_tab_foreground   #ffffff
active_tab_font_style   bold

# Inactive tab colors
inactive_tab_background #2b2b2b
inactive_tab_foreground #cccccc
inactive_tab_font_style normal

# Tab titles get truncated with a stylish ellipsis
tab_title_template "{index}: {title}"
